<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#1D9E75"/>

  <!-- Logo rings centered, scaled to fit nicely -->
  <g transform="translate(600, 270) scale(0.42)">
    <!-- Outermost ring -->
    <circle cx="0" cy="0" r="351.12" fill="none" stroke="#FFFFFF" stroke-width="76" stroke-opacity="0.55"/>
    <!-- Middle ring -->
    <circle cx="0" cy="0" r="199.12" fill="none" stroke="#FFFFFF" stroke-width="76" stroke-opacity="0.78"/>
    <!-- Innermost ring -->
    <circle cx="0" cy="0" r="47.12" fill="none" stroke="#FFFFFF" stroke-width="76" stroke-opacity="1"/>
  </g>

  <!-- HealthOS wordmark -->
  <text x="600" y="490" text-anchor="middle" font-family="Poppins, system-ui, -apple-system, sans-serif" font-weight="700" font-size="64" fill="#FFFFFF" letter-spacing="-1.5">HealthOS</text>

  <!-- Tagline -->
  <text x="600" y="540" text-anchor="middle" font-family="Poppins, system-ui, -apple-system, sans-serif" font-weight="500" font-size="24" fill="#FFFFFF" fill-opacity="0.85">Your AI health companion. On your device.</text>
</svg>
