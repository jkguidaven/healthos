    <circle cx="512" cy="512" r="351.12" fill="none" stroke="#FFFFFF" stroke-width="76" stroke-opacity="0.55"/>
    <circle cx="512" cy="512" r="199.12" fill="none" stroke="#FFFFFF" stroke-width="76" stroke-opacity="0.78"/>
    <circle cx="512" cy="512" r="47.12" fill="none" stroke="#FFFFFF" stroke-width="76" stroke-opacity="1"/>
  </g>
</svg>
